                </div>
            </div>
        </footer>
        
        <script type="text/javascript">
            var $win = $(window);

            var hourToday = new Date().getHours();
            var greeting1 = "You're still awake?";
            var greeting2 = "You have a long day ahead. Get some rest.";
            var i = 0;
            
            if (hourToday >= 6 && hourToday < 12) {
                greeting1 = "Good morning!";
                greeting2 = "How are you today? Let's get this bread.";
            }
            else if (hourToday >= 12 && hourToday < 18) {
                greeting1 = "Good afternoon!";
                greeting2 = "This is your day. Don't waste it.";
            }
            else if (hourToday >= 18 && hourToday < 22) {
                greeting1 = "Good evening.";
                greeting2 = "Stay productive, even at night.";
            }

            $win.on("load", function () {
                setTimeout(function () {
                    animTypewrite(greeting1);
                }, 1000);
                setTimeout(function () {
                    $("#lblGreeting").html("");
                    i = 0;
                }, 3250);
                setTimeout(animTypewrite.bind(null, greeting2), 4500);
            });

            function animTypewrite(greeting) {
                $('#cursorblink').removeClass('anim-blink');
                if (i < greeting.length) {
                    document.getElementById("lblGreeting").innerHTML += greeting.charAt(i);
                    i++;
                    setTimeout(animTypewrite.bind(null, greeting), 50);
                } else {
                    $('#cursorblink').addClass('anim-blink');
                }
            }

            $('#toggleMenu').on("click", function() {
                $('#mobileMenu').toggleClass("show");
                $('body').toggleClass("lock-scroll");
            });
        </script>
